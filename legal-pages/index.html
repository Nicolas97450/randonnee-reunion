<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randonnée Réunion — Documents légaux</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb; color: #1f2937; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { max-width: 480px; padding: 40px 20px; text-align: center; }
        h1 { font-size: 1.8rem; color: #16a34a; margin-bottom: 8px; }
        p { color: #6b7280; margin-bottom: 32px; line-height: 1.6; }
        .links { display: flex; flex-direction: column; gap: 16px; }
        a {
            display: block; padding: 16px 24px; background: #16a34a; color: white;
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
            transition: background 0.2s;
        }
        a:hover { background: #15803d; }
        .footer { margin-top: 40px; color: #9ca3af; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Randonnée Réunion</h1>
        <p>Application mobile de randonnée dédiée à l'île de La Réunion</p>
        <div class="links">
            <a href="/confidentialite">Politique de confidentialité</a>
            <a href="/cgu">Conditions générales d'utilisation</a>
        </div>
        <p class="footer">contact@randonnee-reunion.re</p>
    </div>
</body>
</html>
